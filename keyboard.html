<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>KEYBOARD PRACTICE — 音ゲー風 練習アプリ</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=VT323&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
  :root{
    --bg:#14150f; --bg2:#1d1f16; --panel:#23261a;
    --lcd:#8ba888; --lcd-dark:#6f8a6c; --lcd-fg:#16210f;
    --accent:#ff8c1a; --accent2:#ffd23a; --hot:#d63a2a;
    --fg:#eef0e2; --dim:#9aa089; --line:#3a3d2c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--fg);
    font-family:'JetBrains Mono',monospace;overflow:hidden;-webkit-font-smoothing:antialiased;
    -webkit-tap-highlight-color:transparent;user-select:none}
  .app{display:grid;grid-template-rows:auto 1fr auto;height:100dvh}

  /* HEADER */
  header{background:var(--lcd);border-bottom:4px solid #000;padding:8px 16px;
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:relative;overflow:hidden}
  header::before{content:'';position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.045) 2px 3px)}
  .brand{color:var(--lcd-fg);position:relative;line-height:1}
  .brand .t{font-family:'VT323',monospace;font-size:24px;letter-spacing:.04em}
  .brand .s{font-family:'DotGothic16',monospace;font-size:9px;letter-spacing:.28em;opacity:.7;margin-top:2px}
  .tabs{display:flex;gap:6px;position:relative;margin-left:auto;flex-wrap:wrap}
  .tab{font-family:'DotGothic16',monospace;font-size:11px;letter-spacing:.06em;
    background:var(--lcd-dark);color:var(--lcd-fg);border:2px solid var(--lcd-fg);
    border-radius:4px;padding:6px 12px;cursor:pointer;line-height:1.2;text-align:center}
  .tab small{display:block;font-size:8px;opacity:.65;letter-spacing:.1em;margin-top:1px}
  .tab.on{background:var(--lcd-fg);color:var(--lcd)}

  /* MAIN */
  main{display:grid;grid-template-columns:1fr 220px;min-height:0;background:var(--bg)}
  #stage{position:relative;min-width:0}
  canvas{display:block;width:100%;height:100%}
  .startveil{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(10,11,8,.72);backdrop-filter:blur(2px);cursor:pointer;z-index:5}
  .startveil .box{text-align:center;color:var(--lcd)}
  .startveil .big{font-family:'VT323',monospace;font-size:40px;color:var(--accent2);letter-spacing:.04em}
  .startveil .sub{font-family:'DotGothic16',monospace;font-size:12px;letter-spacing:.18em;margin-top:8px;color:var(--fg)}
  .countdown{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    pointer-events:none;z-index:4;font-family:'VT323',monospace;font-size:120px;color:var(--accent2);
    text-shadow:0 0 24px rgba(255,140,26,.7)}

  /* SIDEBAR */
  .side{background:var(--bg2);border-left:3px solid #000;display:flex;flex-direction:column;min-height:0}
  .side h2{font-family:'DotGothic16',monospace;font-size:10px;letter-spacing:.2em;color:var(--dim);
    padding:9px 12px 5px;display:flex;align-items:center;justify-content:space-between}
  .side h2 .all{display:flex;gap:4px}
  .miniBtn{font-family:'DotGothic16',monospace;font-size:8px;letter-spacing:.08em;color:var(--dim);
    background:var(--panel);border:1px solid var(--line);border-radius:3px;padding:3px 6px;cursor:pointer}
  .miniBtn:active{transform:translateY(1px)}
  .parts{overflow-y:auto;padding:0 8px 10px;flex:1}
  .part{background:var(--panel);border:1px solid var(--line);border-radius:6px;
    padding:7px 8px;margin-bottom:6px;display:flex;align-items:center;gap:7px;position:relative;
    transition:opacity .12s,border-color .12s}
  .part.flash{border-color:var(--accent2)}
  .part.alloff{opacity:.45}
  .dot{width:12px;height:12px;border-radius:3px;flex:none;box-shadow:0 0 0 1px rgba(0,0,0,.4) inset}
  .pname{font-family:'DotGothic16',monospace;font-size:11px;line-height:1.1;flex:1;min-width:0;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pname small{display:block;font-size:8px;color:var(--dim);letter-spacing:.05em}
  .tog{display:flex;gap:3px;flex:none}
  .chip{font-family:'DotGothic16',monospace;font-size:9px;letter-spacing:.02em;
    width:30px;text-align:center;padding:4px 0;border-radius:4px;cursor:pointer;
    background:#15170f;color:var(--dim);border:1px solid var(--line);line-height:1}
  .chip.on{background:var(--accent);color:#1a1206;border-color:var(--accent2);font-weight:700}
  .chip.snd.on{background:#4fd17a;border-color:#9bffb8;color:#06210f}

  /* FOOTER CONTROLS */
  footer{background:var(--bg2);border-top:3px solid #000;padding:8px 14px;
    display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .btn{background:var(--panel);border:2px solid var(--line);border-radius:8px;color:var(--fg);
    cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
    font-family:'DotGothic16',monospace;font-size:11px;letter-spacing:.06em;padding:9px 12px;line-height:1}
  .btn:active{transform:translateY(1px)}
  .btn.play{background:var(--accent);border-color:var(--accent2);color:#1a1206;min-width:96px;font-size:13px}
  .btn svg{width:14px;height:14px;fill:currentColor}
  .speed{display:flex;gap:4px;align-items:center}
  .speed .lab{font-family:'DotGothic16',monospace;font-size:9px;color:var(--dim);letter-spacing:.1em}
  .sp{font-family:'DotGothic16',monospace;font-size:10px;padding:7px 9px;border-radius:6px;cursor:pointer;
    background:var(--panel);border:1px solid var(--line);color:var(--dim);line-height:1}
  .sp.on{background:var(--lcd);color:var(--lcd-fg);border-color:var(--lcd-fg);font-weight:700}
  .progwrap{flex:1;min-width:160px;display:flex;align-items:center;gap:9px}
  .time{font-family:'VT323',monospace;font-size:18px;color:var(--lcd);min-width:96px;text-align:right}
  .bar{flex:1;height:12px;background:#0d0e09;border:1px solid var(--line);border-radius:6px;
    position:relative;cursor:pointer;overflow:hidden}
  .bar .fill{position:absolute;top:0;left:0;bottom:0;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:6px}
  .loopBtn.on{background:var(--lcd);color:var(--lcd-fg);border-color:var(--lcd-fg)}

  @media(max-width:720px){
    main{grid-template-columns:1fr;grid-template-rows:1fr auto}
    .side{border-left:none;border-top:3px solid #000;max-height:34dvh}
    .parts{display:grid;grid-template-columns:1fr 1fr;gap:6px;align-content:start}
    .part{margin-bottom:0}
    .brand .s{display:none}
    .time{font-size:15px;min-width:84px}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <div class="t">KEYBOARD PRACTICE</div>
      <div class="s">FALLING NOTES · 練習モード</div>
    </div>
    <div class="tabs" id="tabs"></div>
  </header>

  <main>
    <div id="stage">
      <canvas id="cv"></canvas>
      <div class="countdown" id="countdown"></div>
      <div class="startveil" id="veil">
        <div class="box">
          <div class="big">▶ TAP TO START</div>
          <div class="sub">画面をタップ / クリックで開始</div>
        </div>
      </div>
    </div>
    <div class="side">
      <h2>PARTS パート
        <span class="all">
          <span class="miniBtn" id="allShow">全表示</span>
          <span class="miniBtn" id="allHide">全消し</span>
        </span>
      </h2>
      <div class="parts" id="parts"></div>
    </div>
  </main>

  <footer>
    <button class="btn play" id="playBtn">
      <svg id="icoPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg id="icoPause" viewBox="0 0 24 24" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
      <span id="playLab">PLAY</span>
    </button>
    <button class="btn" id="restartBtn" title="最初から">
      <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7a5 5 0 1 1-5 5H5a7 7 0 1 0 7-7z"/></svg>
    </button>
    <div class="speed">
      <span class="lab">速度</span>
      <span class="sp" data-rate="0.5">0.5x</span>
      <span class="sp" data-rate="0.75">0.75x</span>
      <span class="sp on" data-rate="1">1x</span>
    </div>
    <button class="btn loopBtn" id="loopBtn">↻ ループ</button>
    <div class="progwrap">
      <div class="bar" id="bar"><div class="fill" id="fill"></div></div>
      <div class="time" id="time">0:00 / 0:00</div>
    </div>
  </footer>
</div>

<script>
const SONGS = JSON.parse(document.getElementById('songs-data').textContent);

/* ===================== STATE ===================== */
let songKey = 'metal';
let DATA = SONGS[songKey];
const state = {
  playing:false, songPos:0, startSongPos:0, rate:1.0, loop:false,
  visible:{}, audible:{}, scheduledIds:[], flashTimers:{},
};
const LOOKAHEAD = 2.2;        // 何秒先のノートを表示するか(=落下時間)
const KEYB_H = 96;            // 鍵盤の高さ(px)
const PITCH_MIN=12, PITCH_MAX=108;

/* ===================== AUDIO ===================== */
// 発音は Tone.Transport のコールバック(メインスレッド駆動)に頼らず、
// 再生開始時に「全ノートを Web Audio の絶対時刻へ直接予約」する。
// こうすると発音タイミングがオーディオスレッド側で確定し、
// 重いCanvas描画でメインスレッドが詰まっても音が遅延/欠落しない。
let synths = {}, drumSynth=null, drumNodes=[], masterVol=null, limiter=null, drumVol=null, audioInit=null;
const POLY=64, DRUM_POOL=8;

function buildSynths(){
  for(const s of Object.values(synths)){ try{s.dispose();}catch(e){} }
  synths={};
  for(const [chStr,info] of Object.entries(DATA.channels)){
    const ch=+chStr;
    if(info.drums) continue;
    const ty=info.synth||'square_vib';
    let synth, chain=[];
    if(ty==='celesta'){
      synth=new Tone.PolySynth(Tone.FMSynth,{harmonicity:3,modulationIndex:6,
        oscillator:{type:'sine'},envelope:{attack:.002,decay:.6,sustain:0,release:.4},
        modulation:{type:'sine'},modulationEnvelope:{attack:.001,decay:.3,sustain:0,release:.2}});
    }else if(ty==='pluck'){
      synth=new Tone.PolySynth(Tone.AMSynth,{harmonicity:2,oscillator:{type:'square'},
        envelope:{attack:.001,decay:.2,sustain:0,release:.15},modulation:{type:'sine'},
        modulationEnvelope:{attack:.001,decay:.1,sustain:0,release:.1}});
    }else if(ty==='sine_pad'){
      synth=new Tone.PolySynth(Tone.Synth,{oscillator:{type:'sine'},
        envelope:{attack:.05,decay:.2,sustain:.6,release:.4}});
      chain.push(new Tone.Filter(2000,'lowpass'));
    }else if(ty==='sine_bass'){
      synth=new Tone.PolySynth(Tone.Synth,{oscillator:{type:'triangle'},
        envelope:{attack:.005,decay:.1,sustain:.7,release:.15}});
      chain.push(new Tone.Filter(700,'lowpass'));
    }else if(ty==='sawtooth_pad'){
      synth=new Tone.PolySynth(Tone.Synth,{oscillator:{type:'sawtooth'},
        envelope:{attack:.02,decay:.3,sustain:.5,release:.5}});
      chain.push(new Tone.Filter(1500,'lowpass'));
    }else{ // square_vib default
      synth=new Tone.PolySynth(Tone.Synth,{oscillator:{type:'square'},
        envelope:{attack:.005,decay:.05,sustain:.7,release:.12}});
      chain.push(new Tone.Filter(2200,'lowpass'));
    }
    synth.maxPolyphony=POLY;
    synth.volume.value=-6;   // パートごとに少し下げて合算時のクリップを防ぐ
    if(chain.length) synth.chain(...chain,masterVol); else synth.connect(masterVol);
    synths[ch]=synth;
  }
}

function buildDrums(){
  for(const n of drumNodes){ try{n.dispose();}catch(e){} }
  drumNodes=[];
  const reg=v=>{ drumNodes.push(v); return v; };
  const pool=(f,n)=>{const a=[];for(let i=0;i<n;i++)a.push(f());let k=0;return()=>{const v=a[k];k=(k+1)%n;return v;};};
  const kick=pool(()=>{const m=reg(new Tone.MembraneSynth({pitchDecay:.04,octaves:4,envelope:{attack:.001,decay:.3,sustain:.01,release:1.2}}));m.connect(drumVol);return m;},DRUM_POOL);
  const tom=pool(()=>{const m=reg(new Tone.MembraneSynth({pitchDecay:.06,octaves:2,envelope:{attack:.001,decay:.25,sustain:0,release:.4}}));m.connect(drumVol);return m;},DRUM_POOL);
  const snare=pool(()=>{const n=reg(new Tone.NoiseSynth({noise:{type:'white'},envelope:{attack:.001,decay:.12,sustain:0}}));n.connect(drumVol);return n;},DRUM_POOL);
  const chat=pool(()=>{const n=reg(new Tone.NoiseSynth({noise:{type:'white'},envelope:{attack:.001,decay:.025,sustain:0}}));n.chain(reg(new Tone.Filter(8000,'highpass')),drumVol);return n;},DRUM_POOL);
  const ohat=pool(()=>{const n=reg(new Tone.NoiseSynth({noise:{type:'white'},envelope:{attack:.001,decay:.25,sustain:0}}));n.chain(reg(new Tone.Filter(7000,'highpass')),drumVol);return n;},DRUM_POOL);
  const cym=pool(()=>{const n=reg(new Tone.NoiseSynth({noise:{type:'pink'},envelope:{attack:.001,decay:.6,sustain:0}}));n.chain(reg(new Tone.Filter(5000,'highpass')),drumVol);return n;},3);
  const clap=pool(()=>{const n=reg(new Tone.NoiseSynth({noise:{type:'white'},envelope:{attack:.001,decay:.08,sustain:0}}));n.chain(reg(new Tone.Filter({frequency:1200,type:'bandpass',Q:1})),drumVol);return n;},3);
  const other=pool(()=>{const n=reg(new Tone.NoiseSynth({noise:{type:'white'},envelope:{attack:.001,decay:.05,sustain:0}}));n.connect(drumVol);return n;},DRUM_POOL);
  drumSynth={kick,tom,snare,chat,ohat,cym,clap,other};
}

function initAudio(){
  if(audioInit) return audioInit;
  audioInit=(async()=>{
    await Tone.start();
    Tone.context.lookAhead=0.2;
    limiter=new Tone.Limiter(-1).toDestination();   // 歪み(クリップ)防止
    masterVol=new Tone.Volume(-6).connect(limiter);
    drumVol=new Tone.Volume(-8).connect(masterVol);
    buildDrums();
    buildSynths();
  })();
  return audioInit;
}

function triggerDrum(p,time,vel){
  const v=vel/127, d=drumSynth;
  if(p===35||p===36) d.kick().triggerAttackRelease('C2',.08,time,v);
  else if(p===37) d.chat().triggerAttackRelease(.02,time,v*.5);
  else if(p===38||p===40) d.snare().triggerAttackRelease(.12,time,v*.8);
  else if(p===39) d.clap().triggerAttackRelease(.06,time,v*.7);
  else if(p===41) d.tom().triggerAttackRelease('F1',.18,time,v);
  else if(p===43) d.tom().triggerAttackRelease('A1',.18,time,v);
  else if(p===45) d.tom().triggerAttackRelease('C2',.16,time,v);
  else if(p===47) d.tom().triggerAttackRelease('E2',.16,time,v);
  else if(p===48) d.tom().triggerAttackRelease('G2',.14,time,v);
  else if(p===50) d.tom().triggerAttackRelease('B2',.12,time,v);
  else if(p===42||p===44) d.chat().triggerAttackRelease(.025,time,v*.5);
  else if(p===46) d.ohat().triggerAttackRelease(.25,time,v*.45);
  else if(p===49||p===57) d.cym().triggerAttackRelease(.6,time,v*.5);
  else if(p===51||p===53||p===59) d.cym().triggerAttackRelease(.4,time,v*.4);
  else if(p===52||p===55) d.cym().triggerAttackRelease(.5,time,v*.45);
  else if(p===56) d.tom().triggerAttackRelease('E4',.08,time,v*.6);
  else if(p===54||p===58) d.chat().triggerAttackRelease(.05,time,v*.4);
  else d.other().triggerAttackRelease(.05,time,v*.5);
}
const midiToFreq=n=>440*Math.pow(2,(n-69)/12);
function findFirst(notes,t){let lo=0,hi=notes.length;while(lo<hi){const m=(lo+hi)>>>1;if(notes[m][2]<t)lo=m+1;else hi=m;}return lo;}

// 現在の songPos から曲末まで、全ノートをオーディオの絶対時刻へ直接予約する。
function scheduleAudioFrom(fromPos){
  if(!drumSynth) return;
  const t0=Tone.now()+0.06;          // 予約の起点(わずかな先読み)
  state.audioStart=t0; state.startSongPos=fromPos;
  const notes=DATA.notes;
  for(let i=findFirst(notes,fromPos-0.01);i<notes.length;i++){
    const n=notes[i], ch=n[0];
    if(!state.audible[ch]) continue;
    const when=t0+(n[2]-fromPos)/state.rate;
    const info=DATA.channels[ch];
    try{
      if(info.drums){ triggerDrum(n[1],when,n[4]); }
      else{
        const sy=synths[ch];
        if(sy){
          let pp=n[1]; while(pp>PITCH_MAX)pp-=12; while(pp<PITCH_MIN)pp+=12;
          sy.triggerAttackRelease(midiToFreq(pp),Math.max(.05,Math.min(n[3]/state.rate,30)),when,n[4]/127);
        }
      }
    }catch(e){}
  }
}
// 予約済みの未来のノートを止める = 音源を破棄して作り直す(Web Audioの予約ごと消える)
function stopAllAudio(){
  if(!audioInit) return;
  buildSynths(); buildDrums();
}

/* ===================== TRANSPORT ===================== */
async function play(){
  await initAudio();
  if(state.songPos>=DATA.duration-0.05) state.songPos=0;
  state.playing=true;
  stopAllAudio();                    // 念のため残響を一掃
  scheduleAudioFrom(state.songPos);
  setPlayUI(true);
}
function pause(){
  if(!state.playing) { setPlayUI(false); return; }
  state.playing=false;
  state.songPos=currentSongPos();    // 停止位置を確定
  stopAllAudio();
  setPlayUI(false);
}
// 再生中の現在位置(オーディオクロック基準=描画ジャンクの影響を受けない)
function currentSongPos(){
  if(!state.playing) return state.songPos;
  const t=Tone.now();
  if(t<state.audioStart) return state.startSongPos;
  return state.startSongPos + (t-state.audioStart)*state.rate;
}
function seek(pos){
  const was=state.playing;
  if(was) pause();
  state.songPos=Math.max(0,Math.min(pos,DATA.duration));
  if(was) play();
  draw();
}
function setRate(r){
  const was=state.playing;
  if(was) pause();
  state.rate=r;
  if(was) play();
  document.querySelectorAll('.sp').forEach(e=>e.classList.toggle('on',+e.dataset.rate===r));
}

/* ===================== KEYBOARD LAYOUT ===================== */
const WHITE_PC=[0,2,4,5,7,9,11];
const isWhite=p=>WHITE_PC.includes(((p%12)+12)%12);
let layout=null; // {lo,hi,white:{pitch:{x,w}}, black:{...}, whiteW}
let rangeCache={}; // per channel min/max pitch (non-drum)

function computeRanges(){
  rangeCache={};
  for(const [chStr,info] of Object.entries(DATA.channels)){
    if(info.drums) continue; rangeCache[chStr]={mn:200,mx:-1};
  }
  for(const n of DATA.notes){
    const c=n[0]; if(!rangeCache[c]) continue;
    if(n[1]<rangeCache[c].mn) rangeCache[c].mn=n[1];
    if(n[1]>rangeCache[c].mx) rangeCache[c].mx=n[1];
  }
}
function buildLayout(cssW){
  let lo=200,hi=-1;
  for(const ch in rangeCache){
    if(!state.visible[ch]) continue;
    lo=Math.min(lo,rangeCache[ch].mn); hi=Math.max(hi,rangeCache[ch].mx);
  }
  if(hi<0){lo=48;hi=72;} // 何も表示していない時のデフォルト
  // 端をCまで広げ、最低でも2オクターブ確保
  while(!isWhite(lo)||(lo%12)!==0) lo--;
  while(!isWhite(hi)) hi++;
  if(hi-lo<24){hi=lo+24; while(!isWhite(hi))hi++;}
  lo-=0; // padding handled
  // 白鍵を数えてxを割り当て
  const whites=[];
  for(let p=lo;p<=hi;p++) if(isWhite(p)) whites.push(p);
  const whiteW=cssW/whites.length;
  const white={},black={};
  whites.forEach((p,i)=>{ white[p]={x:i*whiteW,w:whiteW,i}; });
  const blackW=whiteW*0.62;
  for(let p=lo;p<=hi;p++){
    if(isWhite(p)) continue;
    // 左隣の白鍵
    let lp=p-1; while(!isWhite(lp)) lp--;
    const wx=white[lp]? white[lp].x : 0;
    black[p]={x:wx+whiteW-blackW/2, w:blackW};
  }
  layout={lo,hi,white,black,whiteW,blackW,whites};
}
function pitchX(p){
  if(!layout) return null;
  if(p<layout.lo||p>layout.hi) return null;
  return isWhite(p)? layout.white[p] : layout.black[p];
}

/* ===================== CANVAS / DRAW ===================== */
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  const r=cv.parentElement.getBoundingClientRect();
  W=r.width; H=r.height;
  cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  buildLayout(W);
  draw();
}
window.addEventListener('resize',resize);

function hex2rgb(h){const n=parseInt(h.slice(1),16);return[n>>16&255,n>>8&255,n&255];}

function draw(){
  if(!layout) return;
  const hitY=H-KEYB_H;
  ctx.clearRect(0,0,W,H);
  // 背景
  ctx.fillStyle='#0e0f0a'; ctx.fillRect(0,0,W,H);
  // 白鍵の縦ガイド薄く
  ctx.strokeStyle='rgba(139,168,136,0.06)'; ctx.lineWidth=1;
  for(const p of layout.whites){const w=layout.white[p];ctx.beginPath();ctx.moveTo(w.x+.5,0);ctx.lineTo(w.x+.5,hitY);ctx.stroke();}
  // 小節ガイド(拍)は省略しシンプルに

  const pos=state.songPos;
  const active={}; // pitch -> color (鍵盤ハイライト)
  const activeCh=new Set();   // いま鳴っているパート(行のフラッシュ用)
  // 落下ノート(表示ONの非ドラムパートのみ)
  const notes=DATA.notes;
  const fromT=pos-0.4, toT=pos+LOOKAHEAD+0.1;
  let i=findFirst(notes,fromT-3); if(i<0)i=0;
  for(let k=i;k<notes.length;k++){
    const n=notes[k], s=n[2], e=n[2]+n[3];
    if(e<fromT) continue;
    if(s>toT) break;
    const ch=n[0]; const info=DATA.channels[ch];
    if(s<=pos+0.03 && e>=pos) activeCh.add(ch);
    if(info.drums||!state.visible[ch]) continue;
    const px=pitchX(n[1]); if(!px) continue;
    // y: songPos→hitY, (s-pos)=LOOKAHEAD→top(0)
    const yBot=hitY-((s-pos)/LOOKAHEAD)*hitY;
    const yTop=hitY-((e-pos)/LOOKAHEAD)*hitY;
    const h=Math.max(4,yBot-yTop);
    const x=px.x+1.2, w=Math.max(2,px.w-2.4);
    const [r,g,b]=hex2rgb(info.color);
    // 本体
    const grad=ctx.createLinearGradient(0,yTop,0,yBot);
    grad.addColorStop(0,`rgba(${r},${g},${b},.55)`);
    grad.addColorStop(1,`rgba(${r},${g},${b},.95)`);
    ctx.fillStyle=grad;
    rr(x,yTop,w,h,3); ctx.fill();
    // 下端の強調(着地点)
    ctx.fillStyle=`rgb(${r},${g},${b})`;
    rr(x,Math.min(yBot-3,yBot),w,3,1.5); ctx.fill();
    // 鍵盤に当たっている間ハイライト
    if(s<=pos+0.04 && e>=pos){ active[n[1]]=info.color; }
  }

  // ヒットライン
  ctx.strokeStyle='rgba(255,140,26,.85)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,hitY); ctx.lineTo(W,hitY); ctx.stroke();
  ctx.fillStyle='rgba(255,140,26,.10)'; ctx.fillRect(0,hitY-14,W,14);

  drawKeyboard(hitY,active);

  // パート行のフラッシュ(いま鳴っているパートを光らせる)
  for(const ch in partRows){ partRows[ch].classList.toggle('flash', state.playing && activeCh.has(+ch)); }
}
function rr(x,y,w,h,rad){ctx.beginPath();ctx.roundRect(x,y,w,h,rad);}

function drawKeyboard(top,active){
  const h=KEYB_H;
  // 白鍵
  for(const p of layout.whites){
    const w=layout.white[p]; const on=active[p];
    ctx.fillStyle = on? on : '#e9ead8';
    ctx.fillRect(w.x,top,w.w-1,h);
    if(on){ctx.fillStyle='rgba(255,255,255,.35)';ctx.fillRect(w.x,top,w.w-1,h*.5);}
    ctx.strokeStyle='#0e0f0a'; ctx.lineWidth=1; ctx.strokeRect(w.x+.5,top+.5,w.w-1,h-1);
    if(p%12===0){ // C にラベル
      ctx.fillStyle='rgba(20,20,15,.55)'; ctx.font='9px JetBrains Mono';
      ctx.textAlign='center'; ctx.fillText('C'+(Math.floor(p/12)-1), w.x+w.w/2, top+h-6);
    }
  }
  // 黒鍵
  for(let p=layout.lo;p<=layout.hi;p++){
    if(isWhite(p)) continue; const b=layout.black[p]; if(!b) continue;
    const on=active[p];
    ctx.fillStyle = on? on : '#23261a';
    ctx.fillRect(b.x,top,b.w,h*0.62);
    ctx.strokeStyle='#000'; ctx.lineWidth=1; ctx.strokeRect(b.x+.5,top+.5,b.w-1,h*0.62-1);
    if(on){ctx.fillStyle='rgba(255,255,255,.4)';ctx.fillRect(b.x,top,b.w,h*0.62*.45);}
  }
}

/* ===================== LOOP / TICK ===================== */
function tick(){
  if(state.playing){
    state.songPos=currentSongPos();
    if(state.songPos>=DATA.duration){
      if(state.loop){ stopAllAudio(); state.songPos=0; scheduleAudioFrom(0); }
      else{ pause(); state.songPos=DATA.duration; }
    }
  }
  draw(); updateProgress();
  requestAnimationFrame(tick);
}
function fmt(t){t=Math.max(0,t|0);return Math.floor(t/60)+':'+String(t%60).padStart(2,'0');}
function updateProgress(){
  const d=DATA.duration;
  document.getElementById('fill').style.width=(d?100*state.songPos/d:0)+'%';
  document.getElementById('time').textContent=fmt(state.songPos)+' / '+fmt(d);
}

/* ===================== UI ===================== */
function setPlayUI(p){
  document.getElementById('icoPlay').style.display=p?'none':'block';
  document.getElementById('icoPause').style.display=p?'block':'none';
  document.getElementById('playLab').textContent=p?'PAUSE':'PLAY';
}
let partRows={};   // ch -> row要素(描画ループでのフラッシュ更新用)
function countCh(ch){let c=0;for(const n of DATA.notes)if(n[0]===ch)c++;return c;}

function renderTabs(){
  const el=document.getElementById('tabs'); el.innerHTML='';
  for(const [key,s] of Object.entries(SONGS)){
    const b=document.createElement('div');
    b.className='tab'+(key===songKey?' on':'');
    b.innerHTML=`${s.title}<small>${fmt(s.duration)}</small>`;
    b.onclick=()=>switchSong(key);
    el.appendChild(b);
  }
}
function renderParts(){
  const el=document.getElementById('parts'); el.innerHTML=''; partRows={};
  for(const [chStr,info] of Object.entries(DATA.channels)){
    const ch=+chStr;
    const row=document.createElement('div');
    row.className='part'; row.dataset.ch=ch; partRows[ch]=row;
    const showChip = info.drums? '' :
      `<span class="chip see ${state.visible[ch]?'on':''}" data-k="see">見る</span>`;
    row.innerHTML=`
      <span class="dot" style="background:${info.color}"></span>
      <span class="pname">${info.name}<small>${countCh(ch)}音${info.drums?' · 打楽器':''}</small></span>
      <span class="tog">
        ${showChip}
        <span class="chip snd ${state.audible[ch]?'on':''}" data-k="snd">音</span>
      </span>`;
    el.appendChild(row);
    const see=row.querySelector('.see'), snd=row.querySelector('.snd');
    if(see) see.onclick=()=>{ state.visible[ch]=!state.visible[ch]; see.classList.toggle('on',state.visible[ch]); updateRowDim(row,ch,info); buildLayout(W); };
    snd.onclick=()=>{ state.audible[ch]=!state.audible[ch]; snd.classList.toggle('on',state.audible[ch]); updateRowDim(row,ch,info);
      if(state.playing){ const p=currentSongPos(); stopAllAudio(); state.songPos=p; scheduleAudioFrom(p); } };
    updateRowDim(row,ch,info);
  }
}
function updateRowDim(row,ch,info){
  const off = (info.drums? true : !state.visible[ch]) && !state.audible[ch];
  row.classList.toggle('alloff',off);
}
function switchSong(key){
  const was=state.playing; if(was)pause();
  songKey=key; DATA=SONGS[key]; state.songPos=0; audioInit&&buildSynths();
  initDefaults(); computeRanges(); buildLayout(W);
  renderTabs(); renderParts(); updateProgress(); draw();
}
function initDefaults(){
  state.visible={}; state.audible={};
  for(const [chStr,info] of Object.entries(DATA.channels)){
    const ch=+chStr;
    state.visible[ch]=!info.drums;   // ドラム以外は最初から表示
    state.audible[ch]=true;          // 音は全部ON
  }
}

/* events */
document.getElementById('playBtn').onclick=()=>{ if(state.playing)pause(); else play(); };
document.getElementById('restartBtn').onclick=()=>{ seek(0); };
document.getElementById('loopBtn').onclick=function(){ state.loop=!state.loop; this.classList.toggle('on',state.loop); };
document.querySelectorAll('.sp').forEach(e=>e.onclick=()=>setRate(+e.dataset.rate));
document.getElementById('allShow').onclick=()=>{ for(const c in state.visible)if(!DATA.channels[c].drums)state.visible[c]=true; renderParts(); buildLayout(W); };
document.getElementById('allHide').onclick=()=>{ for(const c in state.visible)state.visible[c]=false; renderParts(); buildLayout(W); };
document.getElementById('bar').onclick=(e)=>{ const r=e.currentTarget.getBoundingClientRect(); seek((e.clientX-r.left)/r.width*DATA.duration); };
const veil=document.getElementById('veil');
veil.onclick=async()=>{ await initAudio(); veil.style.display='none'; startCountdown(()=>play()); };

function startCountdown(then){
  const el=document.getElementById('countdown'); let n=3;
  el.style.display='flex'; el.textContent=n;
  const iv=setInterval(()=>{ n--; if(n<=0){clearInterval(iv);el.style.display='none';then();} else el.textContent=n; },650);
}
window.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault(); if(state.playing)pause(); else play();}
});

/* boot */
initDefaults(); computeRanges(); renderTabs(); renderParts();
requestAnimationFrame(()=>{ resize(); updateProgress(); requestAnimationFrame(tick); });
</script>
</body>
