        slot.solo[p-1] = !slot.solo[p-1];
        sBtn.classList.toggle("on", slot.solo[p-1]);
        log("sys", `S${slot.id} P${p} Solo ${slot.solo[p-1] ? "ON" : "OFF"}`);
      });
      soloRow.appendChild(sBtn);
    }
    // P8 ぶんの空セル (pkey の8列目に揃える)
    muteRow.appendChild(document.createElement("span"));
    soloRow.appendChild(document.createElement("span"));

    refreshPadsForSelectedPart(slot);

    // 4 ドラムパート分のメロディマップ行を生成
    const melodyContainer = document.getElementById(`melody${slot.id}`);
    for (let part = 0; part < 4; part++) {
      const row = document.createElement("div");
      row.className = "melody-part";
      row.innerHTML = `
        <div class="mp-head">
          <span class="name">P${part+1}</span>
          <span class="part-ch" id="partCh${slot.id}-${part}">ch10</span>
          <span class="dpart-name" id="dpartName${slot.id}-${part}">${partDisplayName(part, slot.melodyMode[part])}</span>
          <span class="dscale-wrap">
            <span class="ds-label left">DRUM</span>
            <label class="toggle toggle-dscale" title="Drum: ch10 へそのまま / Scale: melody map で別 ch に書き換え">
              <input type="checkbox" id="mmTog${slot.id}-${part}">
              <span class="knob"></span>
            </label>
            <span class="ds-label right">SCALE</span>
          </span>
        </div>
        <div class="mp-cells drum-mode" id="mpCells${slot.id}-${part}"></div>
      `;
      melodyContainer.appendChild(row);

      // 16 セル生成
      const cellsEl = document.getElementById(`mpCells${slot.id}-${part}`);
      for (let step = 0; step < 16; step++) {
        const cell = document.createElement("div");
        cell.className = "mp-cell";
        cell.id = `mpCell${slot.id}-${part}-${step}`;
        const vel = slot.stepVelocity[part][step];
        const noteN = slot.melodyMap[part][step];
        cell.innerHTML = `
          <span class="vel-bar" style="height:${(vel/127*100).toFixed(0)}%"></span>
          <span class="nname">${noteName(noteN)}</span>
        `;
        // クリックで note + velocity 編集ポップアップを開く
        cell.addEventListener("click", (e) => {
          e.stopPropagation();
          openCellPopup(slot, part, step, cell);
        });
        // ホイールはクイック調整 (shift で note, 通常で velocity)
        cell.addEventListener("wheel", (e) => {
          e.preventDefault();
          if (e.shiftKey) {
            changeCellNote(slot, part, step, e.deltaY < 0 ? 1 : -1);
          } else {
            changeCellVelocity(slot, part, step, e.deltaY < 0 ? 8 : -8);
          }
        }, { passive: false });
        cellsEl.appendChild(cell);
      }

      // 旋律化トグルのハンドラ
      document.getElementById(`mmTog${slot.id}-${part}`).addEventListener("change", (e) => {
        slot.melodyMode[part] = e.target.checked;
        refreshMelodyCells(slot, part);
        const chEl = document.getElementById(`partCh${slot.id}-${part}`);
        if (chEl) chEl.textContent = drumPartChannelLabel(slot, part);
        // v1.31(#19): パート名を DRUM 名 ⇄ SCALE{n} で切替
        const nmEl = document.getElementById(`dpartName${slot.id}-${part}`);
        if (nmEl) nmEl.textContent = partDisplayName(part, slot.melodyMode[part]);
        log("sys", `スロット${slot.id} P${part+1}(${DRUM_PART_NAMES[part]}): ${slot.melodyMode[part] ? "SCALE" : "DRUM"} (${drumPartChannelLabel(slot, part)})`);
      });
    }

    // v1.11: シンセパート (P5/P6/P7) を中立ラベル SYNTH LOW/MID/HIGH で表示
    //         内部 found.part は "BASS"/"LEAD"/"PAD" のまま (ファーム識別用)
    const SYNTH_PART_NAMES = ["SYNTH LOW", "SYNTH MID", "SYNTH HIGH"];
    for (let pi = 0; pi < 3; pi++) {
      const row = document.createElement("div");
      row.className = "melody-part synth-part";
      row.innerHTML = `
        <div class="mp-head">
          <span class="name">P${pi+5}</span>
          <span class="part-ch">ch${SYNTH_CHANNEL_DISPLAY[pi]}</span>
          <span style="color:var(--ink);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;font-weight:700">${SYNTH_PART_NAMES[pi]}</span>
        </div>
        <div class="synth-ctl">
          <select class="syn-scale" id="scaleSel${slot.id}-${pi}"></select>
          <select class="syn-key" id="keySel${slot.id}-${pi}"></select>
        </div>
      `;
      melodyContainer.appendChild(row);

      // populate scale dropdown (グループ分け)
      const scaleSel = document.getElementById(`scaleSel${slot.id}-${pi}`);
      const groups = {};
      SCALES.forEach(s => {
        if (!groups[s.group]) groups[s.group] = [];
        groups[s.group].push(s);
      });
      Object.entries(groups).forEach(([gname, list]) => {
        const og = document.createElement("optgroup");
        og.label = gname;
        list.forEach(s => {
          const o = document.createElement("option");
          o.value = s.id; o.textContent = s.name;
          og.appendChild(o);
        });
        scaleSel.appendChild(og);
      });
      scaleSel.value = slot.synthScale[pi];
      scaleSel.addEventListener("change", (e) => {
        slot.synthScale[pi] = e.target.value;
        log("sys", `スロット${slot.id} P${pi+5}(${SYNTH_PART_NAMES[pi]}) スケール: ${SCALE_BY_ID[e.target.value].name}`);
      });

      // populate key dropdown
      const keySel = document.getElementById(`keySel${slot.id}-${pi}`);
      KEY_NAMES.forEach((name, i) => {
        const o = document.createElement("option");
        o.value = i; o.textContent = name;
        keySel.appendChild(o);
      });
      keySel.value = slot.synthKey[pi];
      keySel.addEventListener("change", (e) => {
        slot.synthKey[pi] = parseInt(e.target.value, 10);
        log("sys", `スロット${slot.id} P${pi+5}(${SYNTH_PART_NAMES[pi]}) キー: ${KEY_NAMES[slot.synthKey[pi]]}`);
      });
    }

    document.getElementById(`btn${slot.id}`).addEventListener("click", () => {
      if (slot.connected) disconnectSlot(slot); else connectSlot(slot);
    });
    // v1.31(#17/#18): Out 選択 / Transpose ボタンは廃止 (出力は PONKEY{id} へ自動)
  });
}

function updateTransposeUI(slot) {
  const el = document.getElementById(`trVal${slot.id}`);
  if (!el) return;
  const v = slot.transpose;
  el.textContent = v === 0 ? "±0" : (v > 0 ? `+${v}` : `${v}`);
  el.classList.toggle("nonzero", v !== 0);
}

// セル操作: ノート編集 (SCALE モード時のみ意味、DRUM 時でも内部値は更新)
function changeCellNote(slot, part, step, delta) {
  let v = slot.melodyMap[part][step] + delta;
  if (v < 0) v = 0;
  if (v > 127) v = 127;
  slot.melodyMap[part][step] = v;
  const cell = document.getElementById(`mpCell${slot.id}-${part}-${step}`);
  if (cell) cell.querySelector(".nname").textContent = noteName(v);
}
// セル操作: velocity 編集
function changeCellVelocity(slot, part, step, delta) {
  let v = slot.stepVelocity[part][step] + delta;
  if (v < 0) v = 0;
  if (v > 127) v = 127;
  slot.stepVelocity[part][step] = v;
  const cell = document.getElementById(`mpCell${slot.id}-${part}-${step}`);
  if (cell) {
    const bar = cell.querySelector(".vel-bar");
    if (bar) bar.style.height = `${(v/127*100).toFixed(0)}%`;
  }
}

// DRUM/SCALE 切替で mp-cells のクラスを更新 (ノート名の濃淡)
function refreshMelodyCells(slot, part) {
  const cellsEl = document.getElementById(`mpCells${slot.id}-${part}`);
  if (!cellsEl) return;
  cellsEl.classList.toggle("drum-mode", !slot.melodyMode[part]);
}

// ── セル編集ポップアップ ─────────────────────────────────
let activeCellPopup = null;

function closeCellPopup() {
  if (activeCellPopup) {
    activeCellPopup.remove();
    activeCellPopup = null;
    document.removeEventListener("mousedown", cellPopupOutsideClick);
    document.removeEventListener("keydown", cellPopupEscapeKey);
  }
}
function cellPopupOutsideClick(e) {
  if (activeCellPopup && !activeCellPopup.contains(e.target)) closeCellPopup();
}
function cellPopupEscapeKey(e) {
  if (e.key === "Escape") closeCellPopup();
}

function openCellPopup(slot, part, step, cellEl) {
  closeCellPopup();
  const popup = document.createElement("div");
  popup.className = "cell-popup";
  popup.innerHTML = `
    <div class="popup-title">P${part+1} ${DRUM_PART_NAMES[part]} · STEP ${String(step+1).padStart(2,'0')}</div>
    <div class="popup-row">
      <label>Note</label>
      <select class="popup-note"></select>
    </div>
    <div class="popup-row">
      <label>Vel</label>
      <select class="popup-vel"></select>
    </div>
  `;

  // Note dropdown (C1 = 24 〜 C7 = 96)
  const noteSel = popup.querySelector(".popup-note");
  for (let n = 24; n <= 96; n++) {
    const o = document.createElement("option");
    o.value = String(n); o.textContent = `${noteName(n)} (${n})`;
    noteSel.appendChild(o);
  }
  noteSel.value = String(slot.melodyMap[part][step]);
  noteSel.addEventListener("change", (e) => {
    const v = parseInt(e.target.value, 10);
    slot.melodyMap[part][step] = v;
    if (cellEl) cellEl.querySelector(".nname").textContent = noteName(v);
  });

  // Velocity dropdown (8 刻み + 127)
  const velSel = popup.querySelector(".popup-vel");
  const velLevels = [];
  for (let v = 0; v <= 120; v += 8) velLevels.push(v);
  velLevels.push(127);
  velLevels.forEach(v => {
    const o = document.createElement("option");
    o.value = String(v);
    o.textContent = v === 0 ? "0 (mute)" : v === 127 ? "127 (max)" : String(v);
    velSel.appendChild(o);
  });
  // 現在値に最も近い preset を選択
  const cur = slot.stepVelocity[part][step];
  const closest = velLevels.reduce((p, c) => Math.abs(c - cur) < Math.abs(p - cur) ? c : p, velLevels[0]);
  velSel.value = String(closest);
  velSel.addEventListener("change", (e) => {
    const v = parseInt(e.target.value, 10);
    slot.stepVelocity[part][step] = v;
    if (cellEl) {
      const bar = cellEl.querySelector(".vel-bar");
      if (bar) bar.style.height = `${(v/127*100).toFixed(0)}%`;
    }
  });

  // 位置決め (セルの直下、画面外にはみ出さないように右端で折り返す)
  document.body.appendChild(popup);
  activeCellPopup = popup;
  const rect = cellEl.getBoundingClientRect();
  const popRect = popup.getBoundingClientRect();
  let left = rect.left + window.scrollX;
  let top  = rect.bottom + window.scrollY + 4;
  if (left + popRect.width > window.innerWidth - 8) {
    left = window.innerWidth - popRect.width - 8;
  }
  if (left < 8) left = 8;
  popup.style.left = `${left}px`;
  popup.style.top  = `${top}px`;

  // 閉じる
  setTimeout(() => {
    document.addEventListener("mousedown", cellPopupOutsideClick);
    document.addEventListener("keydown", cellPopupEscapeKey);
  }, 0);
}

// CC_BAR_SYNC を受けてカレントステップ表示を更新
function updateStepHighlight(slot) {
  // v1.35: これは B = PONKEY が CC_BAR_SYNC で報告してきた位置 (BLE遅延あり)。
  //   赤 (.dev-echo) で「実機がいま追従できてる位置」をデバッグ表示する。
  //   主役の拍 (A = Logic座標) は scheduleStepUI が .current で表示する。

  }

function updateConnectedCount() {
  const n = slots.filter(s => s.connected).length;
  connectedCountPill.textContent = `${n}/${SLOT_COUNT}`;
  connectedCountPill.classList.toggle("ok", n > 0);
}

function updateSlotUI(slot) {
  const el = document.getElementById(`slot${slot.id}`);
  const sub = document.getElementById(`sub${slot.id}`);
  const name = document.getElementById(`name${slot.id}`);

// v1.1: ファーム v4.5.11 と組: 接続直後に CC_SAM_MUTE=127 を送って PONKEY 本体の
//        SAM スピーカーを黙らせる (シンセ+ドラム両方ミュート)。Ableton が音の親になる。
const CC_SAM_MUTE = 0x55;

async function sendSamMute(slot, on) {
  if (!slot.characteristic) return;
  // BLE MIDI: [header, timestamp, status, d1, d2]
  const packet = new Uint8Array([0x80, 0x80, 0xB0, CC_SAM_MUTE, on ? 127 : 0]);
  try {
    if (slot.characteristic.writeValueWithoutResponse) {
      await slot.characteristic.writeValueWithoutResponse(packet);
    } else {
      await slot.characteristic.writeValue(packet);
    }
    log("sys", `スロット${slot.id}: CC_SAM_MUTE = ${on ? "ON (本体ミュート)" : "OFF"}`);
  } catch (err) {
    log("warn", `スロット${slot.id}: CC_SAM_MUTE 送信失敗 ${err.message}`);
  }
}

async function connectSlot(slot) {
  ensureAudio();
  if (!navigator.bluetooth) {
    log("warn", "このブラウザは Web Bluetooth 非対応です");
    return;
  }
  try {
    document.getElementById(`sub${slot.id}`).textContent = "探索中…";
    log("sys", `スロット${slot.id}: BLE 探索開始`);
    const device = await navigator.bluetooth.requestDevice({
      filters: [{ services: [SERVICE_UUID] }]
    });
    device.addEventListener("gattserverdisconnected", () => {
      // v1.24: 切断時は必ず全ノート停止 (押さえたまま切れた音が鳴りっぱなしになるのを防ぐ)
      panicSlot(slot);
      slot.connected = false;
      slot.device = null;
      slot.server = null;
      slot.characteristic = null;
      slot.lastChannel = null;
      updateSlotUI(slot);
      log("sys", `スロット${slot.id}: 切断されました (全ノート停止を送信)`);
    });
    const server  = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    const char    = await service.getCharacteristic(CHAR_UUID);
    await char.startNotifications();
    char.addEventListener("characteristicvaluechanged", (e) => onMidi(slot, e));
    slot.device = device;
    slot.server = server;
    slot.characteristic = char;
    slot.connected = true;
    updateSlotUI(slot);
    log("sys", `スロット${slot.id}: 接続 ${device.name || "(no name)"}`);

    // 接続成功直後に SAM をミュート (本体スピーカーが Ableton と二重に鳴らないように)
    await sendSamMute(slot, true);
    // v1.34: クロック受信中ならこのスロットに現在BPMを送って自動再生をキック
    //   (maybePushBpm はヒステリシスで steady時に送らないため、接続台が取り残されないように)
    if (clockState.transportRunning || (clockState.bpm && clockState.bpm > 0)) {
      sendBpmToSlot(slot, clockState.bpm || 120);
    }
  } catch (err) {
    log("warn", `スロット${slot.id}: 接続失敗 ${err.message}`);
    document.getElementById(`sub${slot.id}`).textContent = "failed";
  }
}

function disconnectSlot(slot) {
  try { slot.server?.disconnect(); } catch {}
  // gattserverdisconnected ハンドラが残りの後始末をする
}

// ── v1.24: Panic (全ノート停止) — stuck note 対策 ──────────────
// 「鳴りっぱなし」= NoteOff が届かない/順序が崩れた時の安全装置。
// 全チャンネルに All Sound Off(CC120) + All Notes Off(CC123) を送る。
function allNotesOffForOutput(out, atTime) {
  if (!out) return;
  for (let ch = 0; ch < 16; ch++) {
    out.send([0xB0 | ch, 64, 0], atTime);   // Sustain (CC64) off — サステインで伸びてる音を切る
    out.send([0xB0 | ch, 120, 0], atTime);  // All Sound Off
    out.send([0xB0 | ch, 123, 0], atTime);  // All Notes Off
  }
}
// v1.26 (item3): CC を無視する音源 (一部ドラムサンプラー等) のために、
// 全チャンネル×全ノート番号に NoteOff を総当たりで送る最終手段。
function fullNoteOffSweep(out, atTime) {
  if (!out) return;
  for (let ch = 0; ch < 16; ch++) {
    for (let n = 0; n < 128; n++) {
      out.send([0x80 | ch, n, 0], atTime);
    }
  }
}
function panicSlot(slot) {
  const out = (slot.outputId && midiAccess) ? midiAccess.outputs.get(slot.outputId) : null;
  if (!out) return;
  const now = performance.now();
  allNotesOffForOutput(out, 0);                               // 即時: CC120/123 + サステインOFF
  fullNoteOffSweep(out, 0);                                   // 即時: 全ノート Off 総当たり
  // 待合室(デジッタ)で未来に予約済みの音が後から鳴るのも消す: バッファ分待ってもう一度 (CC のみ、軽い)
  allNotesOffForOutput(out, now + BLE_JITTER_BUFFER_MS + 60);
  // クロック復元状態もリセット (切断後の再接続でアンカーを引き直す)
  slot.bleClockFw = 0; slot.bleLastTs13 = null; slot.bleOffset = null;
}
function panicAll() {
  slots.forEach(panicSlot);
  log("sys", "🔇 Panic: 全ノート停止 (All Notes Off) を全スロットに送信");
}

// ── BLE MIDI 受信 → 解釈 → 転送 + モニター ────────────
function hex(b) { return b.toString(16).padStart(2,'0').toUpperCase(); }

// MIN版: まとめ送り(バッチング)対応の入口。
//   1パケット = [header] [tsLow status d1 d2] [tsLow status d1 d2] ... と複数イベントを含む。
//   各イベントは 4 バイト(tsLow + 3バイトMIDI)。header は先頭1回。
//   単発(5バイト)パケットも i=1 の1回だけ回るので、従来ファームとも互換。
function onMidi(slot, event) {
  const v = event.target.value;
  const bytes = new Uint8Array(v.buffer);
  if (bytes.length < 5) {
    log("warn", `S${slot.id} 短いパケット (len=${bytes.length}): ${[...bytes].map(hex).join(" ")}`);
    return;
  }
  const headerByte = bytes[0];
  for (let i = 1; i + 3 < bytes.length; i += 4) {
    processMidiEvent(slot, headerByte, bytes[i], bytes[i + 1], bytes[i + 2], bytes[i + 3]);
  }
}

// 1 MIDI イベントの処理 (従来 onMidi の本体)。バッチ内の各イベントごとに呼ばれる。
function processMidiEvent(slot, headerByte, tsByte, status, d1, d2in) {
  const channel = status & 0x0F;
  const cmd     = status & 0xF0;
  let   d2 = d2in;     // v1.12: drum NoteOn のとき per-step velocity に置換 (下で)
  const rawD2 = d2in;
  const raw = `${hex(status)} ${hex(d1)} ${hex(rawD2)}`;

  // v1.21 (候補B): ファームのタイムスタンプから理想再生時刻を復元。
  // 全イベントで呼んでクロック追跡を更新する。v1.22: 待合室を効かせるのは「ドラム=ch9」だけ。
  const dejTime = dejitterSendTime(slot, headerByte, tsByte);

  slot.lastChannel = channel;

  let kind = "";
  let isOn = false, isOff = false;
  if (cmd === 0x90 && d2 > 0)        { kind = "NoteOn "; isOn = true; }
  else if (cmd === 0x80)             { kind = "NoteOff"; isOff = true; }
  else if (cmd === 0x90 && d2 === 0) { kind = "NoteOff"; isOff = true; }
  else if (cmd === 0xB0)             { kind = "CC     "; }
  else                               { kind = `0x${hex(cmd)}`; }

  // v1.2: 内部用 CC を傍受 (ステップ追跡 + ドラムボイス追跡)
  if (cmd === 0xB0) {
    if (d1 === CC_BAR_SYNC) {
      slot.currentStep = d2 & 0x0F;
      updateStepHighlight(slot);
    } else if (d1 === CC_VOICE_SELECT) {
      const part = (d2 >> 4) & 0x0F;
      const voice = d2 & 0x0F;
      if (part < 4 && voice < 16) {
        slot.drumVoice[part] = voice;
        log("sys", `S${slot.id} ボイス変更 P${part+1}(${DRUM_PART_NAMES[part]}) → voice ${voice} (note ${DRUM_NOTE_TABLES[part][voice]})`);
      }
    }
  }

  // v1.12: ドラム NoteOn を処理
  //   1) per-step velocity を d2 に上書き (DRUM/SCALE 両モード共通)
  //   2) SCALE モードならノートも melody map に置換 (ch1-4 に出力)
  let melodyOverride = null;
  if (isOn && channel === 9) {
    const part = identifyDrumPart(slot, d1);
    if (part >= 0) {
      d2 = slot.stepVelocity[part][slot.currentStep];
      if (slot.melodyMode[part]) {
        const melodyNote = slot.melodyMap[part][slot.currentStep];
        const melCh = MELODY_CHANNELS[part];
        melodyOverride = { part, melodyNote, ch: melCh };
      }
    }
  }

  // 2) モニター用にキー逆引き — シンセパート (ch0/3/4) のみマッチ
  //    v1.5: lookupKey の結果を「リマップ済みノート」算出にも使う
  const found = lookupKey(channel, d1);

  // v1.5: シンセノートのキー/スケールリマップ
  // found.keyIndex (0-15) を per-part スケール/キーで計算したノートに置き換える
  // found.shifted の符号: lookupKey は「table[K] + delta = 受信ノート」のとき shifted=-delta を返す
  // → PONKEY 側のシフト量 = -found.shifted。これを加算して保持する
  function synthRemap(d1Raw) {
    if (!found) return d1Raw;
    const ponkeyShift = -(found.shifted || 0);
    const pi = synthPartIdx(found.part);
    const scaleId = slot.synthScale[pi];
    const keyRoot = slot.synthKey[pi];
    const n = synthMappedNote(scaleId, keyRoot, found.part, found.keyIndex)
            + ponkeyShift;
    return n;
  }

  // v1.27 (item2): このイベントのパート番号 (0-3=ドラム P1-P4, 4-6=シンセ P5-P7, -1=不明) と、
  //   Logic へ送ってよいか (Mute/Solo) を判定。NoteOn のみゲートし、NoteOff は常に通す
  //   (mute をノート保持中に切り替えても stuck note にならないように)。
  let evPartIndex = -1;
  if (melodyOverride) evPartIndex = melodyOverride.part;             // ドラム SCALE
  else if (channel === 9) evPartIndex = identifyDrumPart(slot, d1);  // ドラム DRUM
  else if (found) evPartIndex = 4 + synthPartIdx(found.part);       // シンセ
  const blockToLogic = isOn && !partAllowedToLogic(slot, evPartIndex);
  const muteTag = blockToLogic ? ` 🔇(${anySoloActive() ? "not-solo" : "muted"})` : "";

  // 1) 素通し転送
  //    - SCALE 時: 元の ch9 を送らず、書き換えた音を MELODY_CHANNELS[part] (ch1-4) に送る
  //    - シンセ (BASS/LEAD/PAD): スケールリマップ + ch リマップ (ch1/4/5 → ch5/6/7)
  //    - DRUM モード時 / その他: チャンネルそのままで素通し (ch10 = Logic 標準ドラム)
  let fwdNote = "";
  const out = (slot.outputId && midiAccess) ? midiAccess.outputs.get(slot.outputId) : null;
  if (melodyOverride && out) {
    const melNote = transposedNote(slot, melodyOverride.ch, melodyOverride.melodyNote);
    // v1.22: これは ch9 ドラムの SCALE 旋律化 = シーケンサ由来なので待合室(dejTime)を効かせる。
    // v1.27: Mute/Solo でブロックされていなければ送る。
    if (!blockToLogic) {
      // v1.37: 1ms ブリップ → ステップ85%のゲートに。dejTime=0(デジッタOFF)時は now 基準で。
      const onAt = dejTime;
      const offAt = (dejTime || performance.now()) + scaleGateMs();
      out.send([0x90 | melodyOverride.ch, melNote, d2], onAt);
      out.send([0x80 | melodyOverride.ch, melNote, 0], offAt);
    }
    const trTag = slot.transpose ? ` [tr ${slot.transpose>0?"+":""}${slot.transpose}]` : "";
    fwdNote = ` ▶ ${out.name}${muteTag} 🎵 ch${melodyOverride.ch+1} note=${melNote}(${noteName(melNote)})${trTag} [P${melodyOverride.part+1}=${DRUM_PART_NAMES[melodyOverride.part]}, step${slot.currentStep+1}]`;
  } else if (out) {
    if (cmd === 0x90 || cmd === 0x80) {
      const remapped = found ? synthRemap(d1) : d1;
      const outNote = transposedNote(slot, channel, remapped);
      const outCh = (found && channel in SYNTH_CH_REMAP) ? SYNTH_CH_REMAP[channel] : channel;
      const outStatus = (status & 0xF0) | outCh;
      // v1.22: 待合室(デジッタ)は「ドラム=ch9(シーケンサ/ループ)」だけに効かせる。
      //   シンセ生演奏(BASS/LEAD/PAD, found) は即時送信(0)で立ち上がりを犠牲にしない。
      //   → ループは揃う / 生演奏は即応、を同時に成立させる。
      // v1.24: ドラムの NoteOn/NoteOff は同一ファーム時刻で届くため待合室で同時刻になり、
      //   順序が入れ替わると「止める」が先に処理され鳴りっぱなしになる。NoteOff を +2ms 後ろへ。
      let sendAt = (channel === 9) ? dejTime : 0;
      if (channel === 9 && sendAt !== 0 && cmd === 0x80) sendAt += 2;  // NoteOff を NoteOn の後ろに
      // v1.27: Mute/Solo で NoteOn がブロックされていなければ送る (NoteOff は常に通る)。
      if (!blockToLogic) out.send([outStatus, outNote, d2], sendAt);
      let scaleTag = "";
      if (found) {
        const pi = synthPartIdx(found.part);
        const sId = slot.synthScale[pi];
        const kR = slot.synthKey[pi];
        if (sId !== "major" || kR !== 0) {
          scaleTag = ` [${KEY_NAMES[kR]} ${SCALE_BY_ID[sId]?.name?.split(" ")[0]}]`;
        }
      }
      const trTag = (slot.transpose && channel !== 9) ? ` [tr ${slot.transpose>0?"+":""}${slot.transpose}]` : "";
      const chTag = (found && outCh !== channel) ? ` ch${channel+1}→${outCh+1}` : "";
      fwdNote = ` ▶ ${out.name}${muteTag}${chTag}${scaleTag}${trTag}`;
    } else {
      out.send([status, d1, d2]);
      fwdNote = ` ▶ ${out.name}`;
    }
  } else if (slot.outputId) {
    fwdNote = ` ▶ (出力ポート消失)`;
  } else {
    fwdNote = ` ▶ (未割当)`;
  }

  // 2) モニター用パートラベル (found は上で取得済み)
  const partLabel = found ? found.part : (channel === 9 ? "DRUM" : `ch${channel}`);
  let keyLabel = "";
  if (found) {
    keyLabel = ` → key${(found.keyIndex+1).toString().padStart(2,'0')}`;
    if (found.shifted) {
      const sign = found.shifted > 0 ? "+" : "";
      keyLabel += ` (oct ${sign}${found.shifted})`;
    }
  }

  // 3) ログ
  if (isOn || isOff) {
    const tag = isOn ? "on" : "off";
    log(tag,
      `S${slot.id} ${kind} ch${channel.toString().padStart(2,' ')} ` +
      `(${partLabel.padEnd(4,' ')}) note=${d1.toString().padStart(3,' ')} ` +
      `vel=${d2.toString().padStart(3,' ')} [${raw}]${keyLabel}${fwdNote}`);
  } else {
    log("sys", `S${slot.id} ${kind} ch${channel} d1=${d1} d2=${d2} [${raw}]${fwdNote}`);
  }

  // 4) モニター発音 + per-slot パッド点灯
  const slotLastHit = document.getElementById(`slotLastHit${slot.id}`);
  if (isOn && melodyOverride) {
    // SCALE モード: 旋律化された音をモニター発音
    const melNote = transposedNote(slot, melodyOverride.ch, melodyOverride.melodyNote);
    flashSlotPad(slot.id, slot.currentStep);
    if (slotLastHit) slotLastHit.textContent =
      `🎵 ${DRUM_PART_NAMES[melodyOverride.part]} STEP ${String(slot.currentStep+1).padStart(2,'0')} ${noteName(melNote)}`;
    if (globalMonitor) {
      ensureAudio();
      playSynth("LEAD", midiToFreq(melNote), d2);
    }
    const el = document.getElementById(`slot${slot.id}`);
    if (el) {
      el.classList.add("active");
      clearTimeout(slot._activeT);
      slot._activeT = setTimeout(() => el.classList.remove("active"), 400);
    }
  } else if (isOn && channel === 9) {
    // v1.25 (item5): DRUM モードの実機ヒットをモニターに反映する。
    // 旧版はここで何も光らせず「unmapped」表示だけだった = 反映バグ。
    // 実機が Logic に送っているドラム信号は全て Translator を通るので、
    // ファーム改修なしで「どのパート・どのステップに入力が来たか」を表示できる。
    const dpart = identifyDrumPart(slot, d1);           // 0-3 or -1
    const stepDisp = slot.currentStep;
    if (dpart >= 0) {
      flashPartButton(slot.id, dpart + 1);              // 入力の来たパートを光らせる
      if (dpart + 1 === slot.simSelectedPart) {
        flashSlotPad(slot.id, stepDisp);                // 選択中パートならステップパッドも
      }
    }
    const pname = dpart >= 0 ? DRUM_PART_NAMES[dpart] : `note${d1}`;
    if (slotLastHit) slotLastHit.textContent =
      `🥁 ${pname} STEP ${String(stepDisp+1).padStart(2,'0')} vel=${d2}`;
    const el = document.getElementById(`slot${slot.id}`);
    if (el) {
      el.classList.add("active");
      clearTimeout(slot._activeT);
      slot._activeT = setTimeout(() => el.classList.remove("active"), 400);
    }
  } else if (isOn && found) {
    currentPartName = found.part;
    flashSlotPad(slot.id, found.keyIndex);
    const monNote = transposedNote(slot, channel, synthRemap(d1));
    if (slotLastHit) slotLastHit.textContent =
      `${found.part} K${String(found.keyIndex+1).padStart(2,'0')} ${noteName(monNote)}`;
    if (globalMonitor) {
      ensureAudio();
      playMonitor(found.keyIndex, d2, monNote, found.part);
    }
    const el = document.getElementById(`slot${slot.id}`);
    if (el) {
      el.classList.add("active");
      clearTimeout(slot._activeT);
      slot._activeT = setTimeout(() => el.classList.remove("active"), 400);
    }
  } else if (isOn && !found) {
    if (slotLastHit) slotLastHit.textContent = `note ${d1} (unmapped)`;
  }

  // スロット情報更新（最後の ch 表示用）
  const sub = document.getElementById(`sub${slot.id}`);
  if (sub && slot.connected) {
    sub.textContent = `ch=${channel} · ${partLabel.trim()}`;
  }
}

// ── 起動 ────────────────────────────────────────────────
buildSlots();
log("sys", "Translator v1.40-MIN 起動 (BLEまとめ送り対応・通信最適化版。要 v4.5.31-MIN ファーム)");
log("sys", "シミュレータ: P1-P4 でドラムパターン入力, P5-P7 で実時間演奏, shift+P5-P7 で 1bar ループ録音 (パート自動切替)");
log("sys", "1) Web MIDI 許可 → 2) PONKEY 接続 → 3) IAC ポート割当 → 4) (任意) 各種設定 → 5) (任意) プリセットを .json で保存");
</script>
</body>
</html>
